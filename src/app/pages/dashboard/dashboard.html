<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>My App</h2>
    <ul>
      <li routerLink="/dashboard" class="active">Dashboard</li>
      <li *ngIf="userRole === 'admin'" routerLink="/users">Users</li>
      <li routerLink="/profile">Profile</li>
    </ul>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <h2>Dashboard</h2>
      <button mat-raised-button color="warn" (click)="logout()">Logout</button>
    </div>

    <div class="content">
      <div *ngIf="loadingProfile">Loading...</div>

      <mat-card *ngIf="profile">
        <h3>Welcome, {{ profile.name }}!</h3>
        <p><strong>Email:</strong> {{ profile.email }}</p>
        <p><strong>Role:</strong> {{ profile.role }}</p>
        <button *ngIf="userRole !== 'admin'" mat-raised-button color="accent" (click)="makeAdmin()">
          Make me Admin
        </button>
      </mat-card>

      <div class="quick-links">
        <mat-card routerLink="/profile" class="link-card">
          <h3>My Profile</h3>
          <p>View and edit your profile, change password</p>
        </mat-card>

        <mat-card *ngIf="userRole === 'admin'" routerLink="/users" class="link-card">
          <h3>Manage Users</h3>
          <p>Create, search, and delete users</p>
        </mat-card>
      </div>
    </div>
  </div>
</div>
