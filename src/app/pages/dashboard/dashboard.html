<div class="dashboard-container">

  <!-- TOP BAR -->
  <div class="top-bar">
    <h2>Dashboard</h2>
    <button class="logout-btn" (click)="logout()">Logout</button>
  </div>

  <!-- MESSAGES -->
  <p *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </p>

  <p *ngIf="successMessage" class="success-message">
    {{ successMessage }}
  </p>

  <!-- PROFILE -->
  <div class="card">
    <h3>My Profile</h3>

    <p *ngIf="loadingProfile">Loading profile...</p>

    <div *ngIf="profile">
      <p><strong>Name:</strong> {{ profile.name }}</p>
      <p><strong>Email:</strong> {{ profile.email }}</p>
    </div>
  </div>

  <!-- EDIT PROFILE -->
  <div class="card">
    <h3>Edit Profile</h3>

    <input type="text" [(ngModel)]="editData.name" placeholder="Enter name">
    <input type="email" [(ngModel)]="editData.email" placeholder="Enter email">

    <button (click)="updateProfile()" [disabled]="loadingUpdate">
      {{ loadingUpdate ? 'Updating...' : 'Update Profile' }}
    </button>
  </div>

  <!-- CHANGE PASSWORD -->
  <div class="card">
    <h3>Change Password</h3>

    <input type="password" [(ngModel)]="passwordData.oldPassword" placeholder="Old Password">
    <input type="password" [(ngModel)]="passwordData.newPassword" placeholder="New Password">

    <button (click)="changePassword()" [disabled]="loadingPassword">
      {{ loadingPassword ? 'Updating...' : 'Change Password' }}
    </button>
  </div>

  <!-- USERS -->
  <div class="card">
    <h3>User List</h3>

    <p *ngIf="loadingUsers">Loading users...</p>
    <p>Total users: {{ users.length }}</p>

    <ul>
      <li *ngFor="let user of users">
        {{ user.name || 'No Name' }} - {{ user.email || 'No Email' }}
      </li>
    </ul>
  </div>

</div>
